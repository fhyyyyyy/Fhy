name: ielts_app
description: 雅思背单词 App - Flutter 移动端，基于 hefengxian/my-ielts 词库重制
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.5.1

  # 路由
  go_router: ^14.2.0

  # 本地数据库
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1

  # 文字转语音（朗读单词）
  # Pinned to 3.x: 4.x uses Kotlin 2.2 which conflicts with Flutter 3.24.5's Kotlin 1.8
  flutter_tts: ^3.6.0

  # 工具
  intl: ^0.19.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # 代码生成
  build_runner: ^2.4.11
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0

  # 图标生成
  flutter_launcher_icons: ^0.13.1

  # 测试
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  assets:
    - assets/words/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1976D2"
  adaptive_icon_foreground: "assets/icon/splash_logo.png"
