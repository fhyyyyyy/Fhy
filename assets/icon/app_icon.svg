<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- 径向渐变：雅思蓝 -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="60%" stop-color="#1976D2"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </radialGradient>
    <!-- 书的渐变 -->
    <linearGradient id="bookGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <!-- 内阴影 -->
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feFlood flood-color="#000000" flood-opacity="0.25"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgGrad)"/>

  <!-- 装饰圆点：左上 -->
  <circle cx="180" cy="200" r="40" fill="#FFFFFF" opacity="0.12"/>
  <circle cx="120" cy="320" r="20" fill="#FFFFFF" opacity="0.18"/>
  <!-- 右下 -->
  <circle cx="880" cy="820" r="50" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="780" cy="880" r="25" fill="#FFFFFF" opacity="0.15"/>

  <!-- 打开的书 -->
  <g transform="translate(512 540)" filter="url(#softShadow)">
    <!-- 左页 -->
    <path d="M -240 -100 L -240 100 L 0 80 L 0 -120 Z" fill="url(#bookGrad)"/>
    <!-- 右页 -->
    <path d="M 240 -100 L 240 100 L 0 80 L 0 -120 Z" fill="url(#bookGrad)"/>
    <!-- 书脊阴影 -->
    <path d="M 0 -120 L 0 80 L -8 78 L -8 -118 Z" fill="#0D47A1" opacity="0.3"/>
    <path d="M 0 -120 L 0 80 L 8 78 L 8 -118 Z" fill="#0D47A1" opacity="0.3"/>
    <!-- 左页文字线 -->
    <line x1="-200" y1="-60" x2="-40" y2="-65" stroke="#1976D2" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="-200" y1="-20" x2="-40" y2="-25" stroke="#1976D2" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="-200" y1="20" x2="-40" y2="15" stroke="#1976D2" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <!-- 右页文字线 -->
    <line x1="40" y1="-65" x2="200" y2="-60" stroke="#1976D2" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="40" y1="-25" x2="200" y2="-20" stroke="#1976D2" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
    <line x1="40" y1="15" x2="200" y2="20" stroke="#1976D2" stroke-width="8" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- 顶部"I"字母 (IELTS) -->
  <text x="512" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="180" font-weight="900" text-anchor="middle"
        fill="#FFFFFF" letter-spacing="-4">I</text>

  <!-- 底部"雅思"字样 -->
  <text x="512" y="850" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif"
        font-size="100" font-weight="700" text-anchor="middle"
        fill="#FFFFFF" letter-spacing="20">雅思</text>
</svg>
