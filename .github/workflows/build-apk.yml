name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: false

      - name: Create full Android project structure
        run: |
          echo "=== Remove incomplete android/ directory ==="
          rm -rf android
          echo ""
          echo "=== Run flutter create to generate full Android project ==="
          flutter create . \
            --org com.ieltsapp \
            --project-name ielts_app \
            --platforms android \
            --description "IELTS Vocab App"
          echo ""
          echo "=== Verify android/ structure ==="
          find android -type f | head -30
          echo ""
          echo "=== Clean Flutter/Gradle build caches ==="
          rm -rf build
          rm -rf .dart_tool/flutter_build
          rm -rf android/.gradle
          rm -rf android/app/build
          echo "caches cleaned"
          echo ""
          echo "=== Show critical files to diagnose v1/v2 embedding ==="
          echo "--- MainActivity.kt ---"
          find android -name "MainActivity*" -exec cat {} \;
          echo ""
          echo "--- android/app/build.gradle ---"
          cat android/app/build.gradle 2>/dev/null | head -60
          echo ""
          echo "--- AndroidManifest.xml activity tag ---"
          grep -A 3 "activity" android/app/src/main/AndroidManifest.xml
          echo ""

          echo "=== Restore our custom AndroidManifest.xml (keep flutter create's original) ==="
          # Use Python to add INTERNET permission and update label, without replacing the whole file
          python3 <<'PYEOF'
          import re
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          # Update label
          content = content.replace('android:label="ielts_app"', 'android:label="IELTS Vocab"')
          # Add INTERNET permission after <manifest ...> if not present
          if 'android.permission.INTERNET' not in content:
              content = re.sub(
                  r'(<manifest[^>]*>)',
                  r'\1\n    <uses-permission android:name="android.permission.INTERNET"/>',
                  content,
                  count=1
              )
          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
          print("manifest updated")
          PYEOF
          echo "=== Custom manifest installed ==="
          cat android/app/src/main/AndroidManifest.xml

      - name: Inject namespace for old plugins (isar_flutter_libs fix)
        run: |
          set -e
          if [ -f android/build.gradle ]; then
            printf '\n// Auto-injected namespace fix for old plugins\n' >> android/build.gradle
            printf 'subprojects { subproject ->\n' >> android/build.gradle
            printf '    afterEvaluate {\n' >> android/build.gradle
            printf '        if (subproject.hasProperty("android")) {\n' >> android/build.gradle
            printf '            subproject.android {\n' >> android/build.gradle
            printf '                if (namespace == null) {\n' >> android/build.gradle
            printf "                    namespace = 'com.flutter.' + subproject.name.replaceAll('[^a-zA-Z0-9_]', '_')\n" >> android/build.gradle
            printf '                }\n' >> android/build.gradle
            printf '            }\n' >> android/build.gradle
            printf '        }\n' >> android/build.gradle
            printf '    }\n' >> android/build.gradle
            printf '}\n' >> android/build.gradle
            echo "namespace fix injected"
            tail -20 android/build.gradle
          else
            echo "android/build.gradle not found"
          fi

      - name: Fetch word lists from upstream
        run: |
          mkdir -p assets/words
          mkdir -p assets/audio/179
          mkdir -p assets/audio/zhenjing
          mkdir -p assets/audio/538
          echo "Downloading vocabulary JSON files..."
          curl -sL -o assets/words/zhenjing.json \
            https://raw.githubusercontent.com/hefengxian/my-ielts/master/src/pages/ielts/zhenjing.json || echo "zhenjing.json not found"
          curl -sL -o assets/words/listening179.json \
            https://raw.githubusercontent.com/hefengxian/my-ielts/master/src/pages/ielts/listening179.json || echo "listening179.json not found"
          curl -sL -o assets/words/reading538.json \
            https://raw.githubusercontent.com/hefengxian/my-ielts/master/src/pages/ielts/reading538.json || echo "reading538.json not found"
          ls -la assets/words/

      - name: Convert SVG icons to PNG
        run: |
          sudo apt-get install -y librsvg2-bin
          mkdir -p assets/icon
          rsvg-convert -w 1024 -h 1024 assets/icon/app_icon.svg -o assets/icon/app_icon.png 2>/dev/null || echo "no svg, skip"
          rsvg-convert -w 1024 -h 1024 assets/icon/splash_logo.svg -o assets/icon/splash_logo.png 2>/dev/null || echo "no svg, skip"
          ls -la assets/icon/

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ielts-app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      - name: Show APK info
        run: |
          echo "=== APK build complete ==="
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          md5sum build/app/outputs/flutter-apk/app-debug.apk
