name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: true

      - name: Create full Android project structure
        run: |
          echo "=== Remove incomplete android/ directory ==="
          rm -rf android
          ls -la
          echo ""
          echo "=== Run flutter create to generate full Android project ==="
          flutter create . \
            --org com.ieltsapp \
            --project-name ielts_app \
            --platforms android \
            --description "IELTS Vocab App"
          echo ""
          echo "=== Verify android/ structure ==="
          find android -type f | head -30
          echo ""
          echo "=== Restore our custom AndroidManifest.xml ==="
          cat > android/app/src/main/AndroidManifest.xml <<'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-feature android:name="android.hardware.touchscreen" android:required="false"/>
              <application
                  android:label="IELTS Vocab"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:enableOnBackInvokedCallback="true">
                  <meta-data
                      android:name="io.flutter.embedding.android.NormalTheme"
                      android:resource="@style/NormalTheme"/>
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <meta-data
                      android:name="android.max_aspect"
                      android:value="2.1"/>
              </application>
          </manifest>
          EOF
          echo "=== Custom manifest installed ==="
          cat android/app/src/main/AndroidManifest.xml

      - name: Fetch word lists from upstream
        run: |
          mkdir -p assets/words
          mkdir -p assets/audio/179
          mkdir -p assets/audio/zhenjing
          mkdir -p assets/audio/538
          echo "Downloading vocabulary JSON files..."
          curl -sL -o assets/words/zhenjing.json \
            https://raw.githubusercontent.com/hefengxian/my-ielts/master/src/pages/ielts/zhenjing.json || echo "zhenjing.json not found"
          curl -sL -o assets/words/listening179.json \
            https://raw.githubusercontent.com/hefengxian/my-ielts/master/src/pages/ielts/listening179.json || echo "listening179.json not found"
          curl -sL -o assets/words/reading538.json \
            https://raw.githubusercontent.com/hefengxian/my-ielts/master/src/pages/ielts/reading538.json || echo "reading538.json not found"
          ls -la assets/words/

      - name: Convert SVG icons to PNG
        run: |
          sudo apt-get install -y librsvg2-bin
          mkdir -p assets/icon
          rsvg-convert -w 1024 -h 1024 assets/icon/app_icon.svg -o assets/icon/app_icon.png 2>/dev/null || echo "no svg, skip"
          rsvg-convert -w 1024 -h 1024 assets/icon/splash_logo.svg -o assets/icon/splash_logo.png 2>/dev/null || echo "no svg, skip"
          ls -la assets/icon/

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ielts-app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      - name: Show APK info
        run: |
          echo "=== APK build complete ==="
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          md5sum build/app/outputs/flutter-apk/app-debug.apk
