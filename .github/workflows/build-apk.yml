name: Build Android Debug APK

on:
  workflow_dispatch:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: stable
          cache: false

      - name: Create full Android project structure
        run: |
          echo "=== Remove incomplete android/ directory ==="
          rm -rf android
          echo ""
          echo "=== Run flutter create to generate full Android project ==="
          flutter create . \
            --org com.ieltsapp \
            --project-name ielts_app \
            --platforms android \
            --description "IELTS Vocab App"
          echo ""
          echo "=== Verify android/ structure ==="
          find android -type f | head -30
          echo ""
          echo "=== Clean Flutter/Gradle build caches ==="
          rm -rf build
          rm -rf .dart_tool/flutter_build
          rm -rf android/.gradle
          rm -rf android/app/build
          echo "caches cleaned"
          echo ""
          echo "=== Show critical files to diagnose v1/v2 embedding ==="
          echo "--- MainActivity.kt ---"
          find android -name "MainActivity*" -exec cat {} \;
          echo ""
          echo "--- android/app/build.gradle ---"
          cat android/app/build.gradle 2>/dev/null | head -60
          echo ""
          echo "--- AndroidManifest.xml activity tag ---"
          grep -A 3 "activity" android/app/src/main/AndroidManifest.xml
          echo ""

          echo "=== Restore our custom AndroidManifest.xml (keep flutter create's original) ==="
          # Use Python to add INTERNET permission and update label, without replacing the whole file
          python3 <<'PYEOF'
          import re
          path = 'android/app/src/main/AndroidManifest.xml'
          with open(path, 'r', encoding='utf-8') as f:
              content = f.read()
          # Update label
          content = content.replace('android:label="ielts_app"', 'android:label="IELTS Vocab"')
          # Add INTERNET permission after <manifest ...> if not present
          if 'android.permission.INTERNET' not in content:
              content = re.sub(
                  r'(<manifest[^>]*>)',
                  r'\1\n    <uses-permission android:name="android.permission.INTERNET"/>',
                  content,
                  count=1
              )
          with open(path, 'w', encoding='utf-8') as f:
              f.write(content)
          print("manifest updated")
          PYEOF
          echo "=== Custom manifest installed ==="
          cat android/app/src/main/AndroidManifest.xml

      - name: Patch SDK versions (flutter_tts requires minSdk 24, compileSdk 36)
        run: |
          set -e
          # flutter_tts requires minSdk >= 24, compileSdk >= 36
          # Flutter 3.24 generates: minSdk = flutter.minSdkVersion (i.e. 21)
          # We rewrite these lines regardless of format using Python.
          python3 <<'PYEOF'
          import re, glob, os
          # 1) android/app/build.gradle (or .kts)
          candidates = ['android/app/build.gradle', 'android/app/build.gradle.kts']
          for path in candidates:
              if not os.path.exists(path):
                  continue
              with open(path, 'r', encoding='utf-8') as f:
                  content = f.read()
              original = content
              # Replace any minSdk = <anything> with minSdk = 24
              # Matches: minSdk = 21, minSdk = flutter.minSdkVersion, minSdk = flutter.targetSdkVersion
              content = re.sub(r'minSdk\s*=\s*[^\n,)]+', 'minSdk = 24', content)
              # Replace any compileSdk = <anything> with compileSdk = 36
              content = re.sub(r'compileSdk\s*=\s*[^\n,)]+', 'compileSdk = 36', content)
              # Also handle old DSL: minSdkVersion / compileSdkVersion
              content = re.sub(r'minSdkVersion\s+[0-9]+', 'minSdkVersion 24', content)
              content = re.sub(r'compileSdkVersion\s+[0-9]+', 'compileSdkVersion 36', content)
              if content != original:
                  with open(path, 'w', encoding='utf-8') as f:
                      f.write(content)
                  print(f"Patched {path}")
              else:
                  print(f"No changes in {path}")
          # 2) Show result
          for path in candidates:
              if os.path.exists(path):
                  print(f"--- {path} (relevant lines) ---")
                  with open(path, 'r', encoding='utf-8') as f:
                      for line in f:
                          if any(k in line for k in ['minSdk', 'compileSdk', 'targetSdk', 'namespace']):
                              print(line.rstrip())
          PYEOF

      - name: Inject namespace for old plugins (isar_flutter_libs fix)
        run: |
          set -e
          # isar_flutter_libs and other old plugins don't specify namespace,
          # which AGP 8.x requires. Fix it via gradle.properties instead of build.gradle
          # (modifying build.gradle after evaluation breaks it).
          if [ -f android/gradle.properties ]; then
            # Use the AGP 8 built-in flag that auto-migrates packages to namespaces
            if ! grep -q "android.useAndroidX=true" android/gradle.properties; then
              printf '\nandroid.useAndroidX=true\n' >> android/gradle.properties
            fi
            # The real fix: use android.namespace injection at plugin level via pluginManagement
            # Easier: directly patch the isar_flutter_libs build.gradle inside pub-cache after pub get
            echo "namespace will be patched at plugin level after pub get"
          fi

      - name: Verify word lists are committed
        run: |
          echo "=== Verifying word JSON files are present ==="
          ls -la assets/words/ || (echo "ERROR: assets/words/ missing" && exit 1)
          for f in zhenjing.json listening179.json reading538.json; do
            if [ ! -f "assets/words/$f" ]; then
              echo "ERROR: assets/words/$f missing"
              exit 1
            fi
            echo "  ✓ assets/words/$f ($(stat -c %s assets/words/$f) bytes)"
          done

      - name: Convert SVG icons to PNG
        run: |
          sudo apt-get install -y librsvg2-bin
          mkdir -p assets/icon
          rsvg-convert -w 1024 -h 1024 assets/icon/app_icon.svg -o assets/icon/app_icon.png 2>/dev/null || echo "no svg, skip"
          rsvg-convert -w 1024 -h 1024 assets/icon/splash_logo.svg -o assets/icon/splash_logo.png 2>/dev/null || echo "no svg, skip"
          ls -la assets/icon/

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Patch isar_flutter_libs namespace (AGP 8.x requirement)
        run: |
          set -e
          # isar_flutter_libs and other old plugins don't specify namespace
          # AGP 8.x requires it. Patch each plugin's android/build.gradle after pub get.
          for plugin in isar_flutter_libs shared_preferences_android path_provider_android; do
            for d in $HOME/.pub-cache/hosted/pub.dev/${plugin}-*; do
              if [ -d "$d" ] && [ -d "$d/android" ]; then
                BUILD_GRADLE="$d/android/build.gradle"
                if [ -f "$BUILD_GRADLE" ] && ! grep -q "namespace" "$BUILD_GRADLE"; then
                  MANIFEST="$d/android/src/main/AndroidManifest.xml"
                  NS=""
                  if [ -f "$MANIFEST" ]; then
                    NS=$(grep -oP 'package="\K[^"]+' "$MANIFEST" 2>/dev/null || true)
                  fi
                  if [ -z "$NS" ]; then
                    NS="io.flutter.plugins.${plugin}"
                  fi
                  printf "\nandroid {\n    namespace \"%s\"\n}\n" "$NS" >> "$BUILD_GRADLE"
                  echo "namespace injected for $plugin: $NS"
                fi
              fi
            done
          done

      - name: Run build_runner
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Build Debug APK
        run: flutter build apk --debug

      - name: Upload APK to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ielts-app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
          if-no-files-found: error

      - name: Show APK info
        run: |
          echo "=== APK build complete ==="
          ls -lh build/app/outputs/flutter-apk/app-debug.apk
          md5sum build/app/outputs/flutter-apk/app-debug.apk
